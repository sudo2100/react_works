<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flex 예제</title>
  <style>
    .container{
      width: 400px;
      height: 300px;
      border: 1px solid #000;
      display: flex;
      /* 교차축(cross-axis)의 정렬 방법을 지정 */
      align-items: center; /* 세로 방향으로 중앙 정렬 */
      align-items: start;  /* 세로 방향으로 시작 위치에 정렬 */
      align-items: end; /* 세로 방향으로 끝 위치에 정렬 */
      
      /* justify-content와 함께 사용 */
      justify-content: space-around;
      flex-direction: row-reverse;

      gap: 16px; /* 간격 */
    }
    .box{
      width: 60px;
      height: 60px;
      background-color: skyblue;
    }
    p{text-align: center;}
  </style>
</head>
<body>
  <div class="container">
    <div class="box"><p>1</p></div>
    <div class="box"><p>2</p></div>
    <div class="box"><p>3</p></div>
    <div class="box"><p>4</p></div>
  </div>
</body>
</html>
