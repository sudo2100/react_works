<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flex 예제</title>
  <style>
    .container{
      display: flex;
      /* 아이템을 가로, 세로 방향으로 배치 */
      flex-direction: row; /* 가로 방향 */
      flex-direction: column; /* 세로 방향 */
      gap: 16px; /* 간격 */
    }
    .box{
      width: 100px;
      height: 100px;
      background-color: lightgreen;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
  </div>
</body>
</html>
