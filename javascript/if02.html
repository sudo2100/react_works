<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>다중 조건문</title>
  <style>
    .display{
      margin-bottom: 10px;
      font-size: 20px;
      font-weight: bold;
    }
    button{
      /* top right bottom left */
      padding: 5px 10px 5px 10px;
    }
  </style>
</head>
<body>
  <h2>신호등 프로그램</h2>
  <div id="result" class="display"></div>
  <button onclick="checkColor()">판별하기</button>

  <script>
    //DOM(Document of Model) - document 객체 사용
    function checkColor(){
      // let color = "red"
      //prompt("입력할 내용") 함수
      let color = prompt("신호등 색상을 입력하세요(red, yellow, green)");
      const result = document.getElementById("result")

      if(color == null){ //취소 버튼 눌렀을때 
        result.innerText = "입력이 취소되었습니다.";
        result.style.color = "red";
      }else{ //정상인 경우
        if(color == "red"){
          //console.log("멈춤");
          result.innerText = "멈춤";
        }else if(color == "yellow"){
          //console.log("준비");
          result.innerText = "준비";
        }else if(color == "green"){
          //console.log("진행");
          result.innerText = "진행";
        }else{
          //console.log("알 수 없는 색상입니다.");
          result.innerHTML = "알 수 없는 색상입니다.<br> \
            red, yellow, green 중 하나를 입력하세요"
        }
      }
    }
  </script>

</body>
</html>
