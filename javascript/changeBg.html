<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>배경색 바꾸기</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 메뉴 버튼 만들기 -->
   <div class="menu">
    <ul>
      <li>
        <a href="#" onclick="changeBg('green')">Green</a>
      </li>
      <li>
        <a href="#" onclick="changeBg('black')">Black</a>
      </li>
      <li>
        <a href="#" onclick="changeBg('pink')">Pink</a>
      </li>
    </ul>
   </div>

   <!-- 배경색 넣을 사각형 -->
   <div id="rect" class="box"></div>

   <script>
    //매개변수가 color인 함수
    function changeBg(color){
      //사각형 선택
      let rect = document.getElementById("rect");
      //배경 색상 변경
      rect.style.backgroundColor = color;
    }
   </script>
</body>
</html>
