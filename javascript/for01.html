<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>반복문 - for</title>
</head>
<body>
  <script>
    let i = 1;
    for(i = 1; i <= 10; i++){
      console.log(i);
    }

    //1~10 중 홀수만 출력
    let j = 1;
    for(j = 1; j <= 10; j++){
      //홀수 출력
      if(j % 2 === 1)
        console.log(j);
    }
  </script>
</body>
</html>
