<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>조건문 - if문</title>
</head>
<body>
  <h2>조건문 - if</h2>

  <script>
    //변수 선언과 초기화(값을 기억)
    let age = 17;

    //출력
    //console.log(age);

    //조건 - 나이가 20세 이상이면 "성인입니다" 출력.
    if(age >= 20){ //조건이 true일때 실행
      console.log("성인입니다.");
    }
    console.log("나이는 " + age + "세입니다.");

    //조건 - 나이가 20세 이상이면 "성인입니다" 아니면 "미성년자입니다." 출력.
    if(age >= 20){
      console.log("성인입니다.");
    }else{
      console.log("미성년자입니다.");   
    }
    console.log("나이는 " + age + "세입니다.");

  </script>
</body>
</html>
