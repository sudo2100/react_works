<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스타일 예제</title>
  <!-- 외부 스타일 파일 연결 -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h1>세계 10대 푸드</h1>
    <h2>마늘(Garlic)</h2>
    <p id="p1">일해백리(一害百利)는 마늘의 별명이다. 한가지 해가 있고 백가지
      이로움이 있다는 뜻이다.<br> 그 한가지 해란 <span class="accent">아린 맛</span>으로 인해
      위에 부담을 준다는 것이다.</p>
    <p id="p2">마늘 특유의 <span class="accent">아린 맛</span>은 알리신이라는 성분 때문으로 살균 및 항균
      작용을 하며<br> 마늘에 들어있는 아연이 피로 회복에 도움을 준다.</p>
  </div>
</body>
</html>
